#cloud-config
# Layer 2 bootstrap for the cloud Host. Rendered by Terraform templatefile();
# template variables: data_volume_device, agent_config_param. Changing this
# file replaces the instance (ADR 0017): the Data volume, and therefore
# /srv/data, survives.
# Replacement drill exercised: 2026-07-04 (ADR 0017).
# M3 added: git package and aws-cli snap (deploy-model prerequisites).
# M4 added: GPG-verified CloudWatch agent install, configured from SSM.

package_update: true
package_upgrade: true

apt:
  sources:
    docker.list:
      source: deb [arch=arm64 signed-by=$KEY_FILE] https://download.docker.com/linux/ubuntu $RELEASE stable
      keyid: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88

packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
  - git

users:
  - default
  - name: platform
    gecos: WKX platform user
    shell: /bin/bash
    lock_passwd: true
    # docker group membership is added in runcmd; the group only exists
    # once the docker-ce package has installed.

write_files:
  - path: /usr/local/bin/wkx-mount-data
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Idempotent format-if-blank + mount of the Data volume at /srv/data.
      # Safe to re-run; every step is a no-op when its work is already done.
      set -euo pipefail
      DEVICE='${data_volume_device}'

      # Terraform attaches the volume only after the instance reports
      # running, so poll rather than assume presence (up to 3 minutes).
      for i in $(seq 1 36); do
        if [ -e "$DEVICE" ]; then break; fi
        sleep 5
      done
      if [ ! -e "$DEVICE" ]; then
        echo "wkx-mount-data: $DEVICE never appeared" >&2
        exit 1
      fi

      # Format only when the device carries no filesystem (first boot ever).
      if ! blkid "$DEVICE" >/dev/null 2>&1; then
        mkfs.ext4 -L wkx-data "$DEVICE"
      fi

      mkdir -p /srv/data
      if ! grep -q '^LABEL=wkx-data ' /etc/fstab; then
        echo 'LABEL=wkx-data /srv/data ext4 defaults,nofail 0 2' >> /etc/fstab
      fi
      if ! mountpoint -q /srv/data; then
        mount /srv/data
      fi
      chown platform:platform /srv/data

  - path: /usr/local/bin/wkx-install-cwagent
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # GPG-verified CloudWatch agent install (M4). Key URL and fingerprint
      # come from the agent's package-signature docs; any mismatch aborts
      # bootstrap loudly rather than installing anyway.
      set -euo pipefail
      KEY_URL='https://amazoncloudwatch-agent.s3.amazonaws.com/assets/amazon-cloudwatch-agent.gpg'
      DEB_URL='https://amazoncloudwatch-agent-ap-southeast-2.s3.ap-southeast-2.amazonaws.com/ubuntu/arm64/latest/amazon-cloudwatch-agent.deb'
      EXPECTED_FPR='937616F3450B7D806CBD9725D58167303B789C72'

      workdir=$(mktemp -d)
      trap 'rm -rf "$workdir"' EXIT
      export GNUPGHOME="$workdir/gnupg"
      mkdir -m 700 "$GNUPGHOME"

      curl -fsSL -o "$workdir/agent.gpg" "$KEY_URL"
      gpg --import "$workdir/agent.gpg"
      fpr=$(gpg --with-colons --fingerprint | awk -F: '$1 == "fpr" { print $10; exit }')
      if [ "$fpr" != "$EXPECTED_FPR" ]; then
        echo "wkx-install-cwagent: key fingerprint mismatch: $fpr" >&2
        exit 1
      fi

      curl -fsSL -o "$workdir/agent.deb" "$DEB_URL"
      curl -fsSL -o "$workdir/agent.deb.sig" "$DEB_URL.sig"
      gpg --verify "$workdir/agent.deb.sig" "$workdir/agent.deb"
      dpkg -i "$workdir/agent.deb"

runcmd:
  - [/usr/local/bin/wkx-mount-data]
  - [usermod, -aG, docker, platform]
  - [systemctl, enable, --now, docker]
  - [systemctl, enable, --now, snap.amazon-ssm-agent.amazon-ssm-agent.service]
  # ADR 0003: nothing listens on 22. The Ubuntu AMI ships openssh enabled;
  # disable and mask it so the daemon cannot start. Access is SSM only.
  - [sh, -c, 'systemctl disable --now ssh.socket ssh.service 2>/dev/null || true']
  - [systemctl, mask, ssh.socket, ssh.service]
  - [/usr/local/bin/wkx-install-cwagent]
  # Agent config comes from SSM (M4): the same apply that replaces the Host
  # publishes the parameter. -s starts the agent and enables its systemd
  # unit, so it survives reboots. The leading slash is required for
  # hierarchical parameter names.
  - [/opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl, -a, fetch-config, -m, ec2, -c, 'ssm:${agent_config_param}', -s]
  # Deploy-model prerequisites (M3): the repo checkout needs git (above) and
  # rendering secrets from SSM plus ECR login need the AWS CLI.
  - [snap, install, aws-cli, --classic]
